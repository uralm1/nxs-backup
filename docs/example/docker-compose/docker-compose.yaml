services:
  nxs-backup:
    image: nixyslab/nxs-backup:latest
    container_name: nxs-backup
    command:
      - nxs-backup
      - -c
      - /nxs-backup.yml
      - start
      - all
    volumes:
      - metrics:/tmp/metrics
      - type: bind
        source: ./backup
        target: /var/nxs-backup/dump_tmp
      - type: bind
        source: /path/to/backup
        target: /path/to/backup
    configs:
      - nxs-backup.conf
  metrics-server:
    image: nixyslab/nxs-backup:latest
    container_name: nxs-backup
    command:
      - nxs-backup
      - -c
      - /nxs-backup.yml
      - server
    volumes:
      - metrics:/tmp/metrics
    configs:
      - nxs-backup.conf
configs:
  nxs-backup.conf:
    file: ./nxs-backup.yml
volumes:
  metrics: