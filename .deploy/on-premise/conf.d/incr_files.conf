job_name: PROJECT-incr_files
type: incr_files
tmp_dir: /var/nxs-backup/dump_tmp
safe_rotation: false
deferred_copying: false
sources:
  - name: incr_files
    targets:
      - /var/www/html/www.site.io
      - /some/path/for/backup
    excludes:
      - tmp
      - log
      - some_extra_exclude
    gzip: true
    save_abs_path: true
storages_options:
  - storage_name: local
    backup_path: /var/nxs-backup/dump
    retention:
      months: 12
