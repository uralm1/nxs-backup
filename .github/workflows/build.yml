name: Build

on:
  push:
    tags-ignore:
      - '**'
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-go@v6
      name: Setup Go
      with:
        go-version: '1.25.6'

    - name: Build
      run: GOOS=linux CGO_ENABLED=0 go build -ldflags="-s -w" -v -o nxs-backup

    - name: Compress
      run: tar -czvf ural-nxs-backup-amd64.tar.gz nxs-backup README.md LICENSE

    - uses: actions/upload-artifact@v6
      with:
        name: ural-nxs-backup-amd64.tar.gz
        path: ural-nxs-backup-amd64.tar.gz

