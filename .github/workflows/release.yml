name: Build and release

on: [push]

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-go@v6
      name: Setup Go
      with:
        go-version: '1.25.6'

    - name: Set version
      if: github.ref_type == 'tag'
      run: V=${{ github.ref_name }} && sed -i "s@\(VERSION = \)\".*\"@\1\"$V\"@" misc/version.go

    - name: Build
      run: GOOS=linux CGO_ENABLED=0 go build -ldflags="-s -w" -v -o nxs-backup

    - name: Compress
      run: tar -czvf ural-nxs-backup-amd64.tar.gz nxs-backup README.md LICENSE

    - uses: actions/upload-artifact@v6
      with:
        name: ural-nxs-backup-amd64.tar.gz
        path: ural-nxs-backup-amd64.tar.gz

    - uses: softprops/action-gh-release@v2
      name: Upload binaries to release
      if: github.ref_type == 'tag'
      with:
        files: ural-nxs-backup-amd64.tar.gz
        prerelease: ${{ contains(github.ref_name, 'rc') }}

